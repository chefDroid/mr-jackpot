<!DOCTYPE html>
<html>
<head>
  <title>VIP Picks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <h1>🔥 VIP PICKS</h1>

  <div class="leagues">
  <button onclick="loadLeague('basketball_nba')">NBA</button>
  <button onclick="loadLeague('baseball_mlb')">MLB</button>
  <button onclick="loadLeague('icehockey_nhl')">NHL</button>
  <button onclick="loadLeague('basketball_wnba')">WNBA</button>
  <button onclick="loadLeague('soccer_epl')">SOCCER</button>
  <button onclick="loadLeague('mma_mixed_martial_arts')">UFC</button>
</div>

  <div id="vipContent"></div>
</div>

<script>
async function loadLeague(sport) {

  const res = await fetch(
    `https://jackpot-api.kasgoatpro.workers.dev/props?sport=${sport}`
  );

  const data = await res.json();

  const props = data.props || [];

  document.getElementById("vipContent").innerHTML =
    props.map(p => `
      <div class="bet">

        <h3>🔥 ${p.player}</h3>

        <p>
          ${p.pick}
        </p>

        <p>
          📊 ${p.market}
        </p>

        <p>
          💰 Odds: ${p.odds}
        </p>

        <p>
          🎯 Confidence: ${p.confidence}%
        </p>

        <small>
          ${p.game}
        </small>

      </div>
    `).join("");
}
</script>

</body>
</html>
